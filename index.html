<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Product list with cart</title>
</head>

<body>
  <div class="main">
    <div class="heading">
      <h1>Desserts</h1>
      <div class="grid"></div>
    </div>
    <div class="cart">
      <h1 class="cart-heading">Your Cart (<span id="cart-quantity">0</span>)</h1>
      <div class="cart-products"></div>
      <div class="cart-content">
        <img class="cart-cake" src="./assets/images/illustration-empty-cart.svg">
        <p class="cartpara">
          Your added items will appear here
        </p>
        <div class="aftercart" style="display:none;">
          <div class="order-total">
            Order Total
            <p>$0.00</p>
          </div>
          <div class="carbon-box">
            <img src="https://product-list-with-cart-front-end.netlify.app/13953e5e1e4c166b4acd.svg">
            <p class="carbon">
              This is a <strong>carbon-neutral</strong> delivery
            </p>
          </div>
          <button class="confirm-order">Confirm Order</button>
        </div>
      </div>
    </div>
  </div>
  <div id="order-popup" class="popup">
    <div class="popup-content">
      <span class="close">&times;</span>
      <img src="assets/images/icon-order-confirmed.svg" />
      <h1>Order Confirmed</h1>
      <p class="textinconfirm">We hope you enjoy your food!</p>
      <div class="order-confirm-products">
        <div class="order-confirm-product">
          <div class="order-confirm-list-product">
            <div class="img-name-flex">
              <img src="assets/images/image-brownie-thumbnail.jpg" />
              <div class="name-meta-flex">
                <p class="order-confirm-name">Classic Tiramisu</p>
                <div class="quantity-price-flex">
                  <p class="order-confirm-quantity">1x</p>
                  <p class="order-confirm-price">@$5.50</p>
                </div>
              </div>
            </div>
            <p class="order-confirm-item-total">$5.50</p>
          </div>
        </div>
        <p class="confirm-order-total">Order total
          <span class="confirm-order-total-price"></span>
        </p>
      </div>

      <button class="new-order" onclick="resetCart();">Start New Order</button>
    </div>
  </div>
  </div>
  <script src="index.js"></script>
</body>

</html>
